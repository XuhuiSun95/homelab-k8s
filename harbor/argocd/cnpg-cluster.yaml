apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  name: harbor-cnpg-cluster
  namespace: argocd
spec:
  project: default
  destination:
    namespace: harbor
    server: 'https://kubernetes.default.svc'
  sources:
    - path: .
      repoURL: 'oci://ghcr.io/cloudnative-pg/charts/cluster'
      targetRevision: 0.5.0
      helm:
        valueFiles:
        - $values/harbor/cnpg-cluster-values.yaml
    - repoURL: 'https://github.com/XuhuiSun95/homelab-k8s.git'
      targetRevision: main
      ref: values
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true