apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  name: harbor-harbor
  namespace: argocd
spec:
  project: default
  destination:
    namespace: harbor
    server: 'https://kubernetes.default.svc'
  ignoreDifferences:
    - group: ''
      kind: Secret
      jsonPointers:
        - /data
    - group: apps
      kind: Deployment
      jqPathExpressions:
        - .spec.template.metadata.annotations
    - group: apps
      kind: StatefulSet
      jqPathExpressions:
        - .spec.template.metadata.annotations
  sources:
    - chart: harbor
      repoURL: 'https://helm.goharbor.io'
      targetRevision: 1.18.2
      helm:
        valueFiles:
          - $values/harbor/values.yaml
    - repoURL: 'https://github.com/XuhuiSun95/homelab-k8s.git'
      targetRevision: main
      ref: values
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
    automated:
      selfHeal: true
