# Harbor as pull-through registry cache at https://registry-mirror.local.xuhuisun.com
# Istio VirtualService routes that host to this service; TLS is terminated at the gateway.

expose:
  type: clusterIP
  tls:
    enabled: false  # Istio terminates TLS; backend is HTTP

externalURL: https://registry-mirror.local.xuhuisun.com

# Persistence for registry storage and internal components
persistence:
  enabled: true
  resourcePolicy: keep
  persistentVolumeClaim:
    registry:
      storageClass: proxmox-local-zfs-xfs
      size: 20Gi
    jobservice:
      storageClass: proxmox-local-zfs-xfs
      size: 1Gi
    database:
      storageClass: proxmox-local-zfs-xfs
      size: 1Gi
    redis:
      storageClass: proxmox-local-zfs-xfs
      size: 1Gi
    trivy:
      storageClass: proxmox-local-zfs-xfs
      size: 5Gi

# Change after first login
harborAdminPassword: "Harbor12345"

ipFamily:
  policy: PreferDualStack
  # TODO: fix upstream chart issue
  # families: ["IPv6", "IPv4"]

nginx:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      memory: 64Mi
  tolerations:
    - key: node-role.kubernetes.io/system
      operator: Exists
      effect: NoSchedule
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: karpenter.sh/nodepool
              operator: In
              values: ["system"]
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: harbor
              app.kubernetes.io/component: core
          topologyKey: kubernetes.io/hostname
  priorityClassName: platform-critical

