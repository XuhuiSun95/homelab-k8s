type: postgresql
version:
  postgresql: "18"
mode: recovery

recovery:
  method: object_store
  clusterName: immich-cnpg-cluster
  database: immich
  endpointURL: https://minio.primary-object-store.svc.cluster.local
  endpointCA:
    create: false
    name: minio-ca-bundle
    key: ca-bundle.crt
  provider: s3
  s3:
    bucket: cloudnative-pg-backups
    accessKey: om9WSI45aMEZxBqASwSy
    secretKey: f31Tff9m6TaPJRhZ45GjO0HUxzx4yM8HmQ7xCnAJ

cluster:
  instances: 3
  imageName: "ghcr.io/tensorchord/cloudnative-vectorchord:18"
  storage:
    size: 10Gi
    storageClass: proxmox-local-zfs-xfs
  resources:
    requests:
      cpu: 1
      memory: 2Gi
    limits:
      cpu: 1
      memory: 2Gi
  affinity:
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required
  roles:
    - name: immich
      superuser: true
      login: true
  monitoring:
    enabled: true
    podMonitor:
      enabled: true
    prometheusRule:
      enabled: false
  postgresql:
    synchronous:
      method: any
      number: 1
    parameters:
      wal_compression: lz4
      max_wal_size: 1GB
      max_slot_wal_keep_size: 2GB
      checkpoint_timeout: 15min
      checkpoint_completion_target: '0.9'
      checkpoint_flush_after: 2MB
      wal_writer_flush_after: 2MB
      min_wal_size: 512MB
      shared_buffers: 512MB
      effective_cache_size: 1536MB
      work_mem: 8MB
      maintenance_work_mem: 128MB
      autovacuum_vacuum_cost_limit: '2400'
      random_page_cost: '1.1'
      effective_io_concurrency: '64'
      maintenance_io_concurrency: '32'
      log_checkpoints: 'on'
      log_lock_waits: 'on'
      log_min_duration_statement: '1000'
      log_statement: 'ddl'
      log_temp_files: '1024'
      log_autovacuum_min_duration: '1s'
      pg_stat_statements.max: '10000'
      pg_stat_statements.track: 'all'
      hot_standby_feedback: 'on'
    shared_preload_libraries:
      - "vchord.so"
  initdb:
    database: immich
    postInitSQL:
      - CREATE EXTENSION IF NOT EXISTS "vchord" CASCADE;
      - CREATE EXTENSION IF NOT EXISTS "earthdistance" CASCADE;

backups:
  enabled: true
  endpointURL: https://minio.primary-object-store.svc.cluster.local
  endpointCA:
    create: false
    name: minio-ca-bundle
    key: ca-bundle.crt
  provider: s3
  s3:
    bucket: cloudnative-pg-backups
    accessKey: om9WSI45aMEZxBqASwSy
    secretKey: f31Tff9m6TaPJRhZ45GjO0HUxzx4yM8HmQ7xCnAJ
  scheduledBackups:
    - name: daily-backup
      schedule: "0 30 7 * * *"
      backupOwnerReference: self
  retentionPolicy: "7d"