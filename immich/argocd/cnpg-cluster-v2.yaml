apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  name: immich-cnpg-cluster-v2
  namespace: argocd
spec:
  project: default
  destination:
    namespace: immich
    server: 'https://kubernetes.default.svc'
  sources:
    - path: .
      repoURL: 'oci://ghcr.io/cloudnative-pg/charts/cluster'
      targetRevision: 0.6.0
      helm:
        valueFiles:
        - $values/immich/cnpg-cluster-values-v2.yaml
    - repoURL: 'https://github.com/XuhuiSun95/homelab-k8s.git'
      targetRevision: main
      ref: values
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true