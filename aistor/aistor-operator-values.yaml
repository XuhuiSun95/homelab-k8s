global:
  operator:
    # TODO: missing priorityClassName
    replicas: 2
    resources:
      requests:
        cpu: 2m
        memory: 25Mi
      limits:
        memory: 25Mi
    tolerations:
      - key: node-role.kubernetes.io/system
        operator: Exists
        effect: NoSchedule


operators:
  adminjob:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
              - key: karpenter.sh/nodepool
                operator: In
                values: ["system"]
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchLabels:
                  aistor.min.io/name: adminjob-operator
              topologyKey: topology.kubernetes.io/zone
            weight: 100
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                aistor.min.io/name: adminjob-operator
            topologyKey: kubernetes.io/hostname
    resources:
      requests:
        cpu: 1m
        memory: 20Mi
      limits:
        memory: 20Mi
  object-store:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
              - key: karpenter.sh/nodepool
                operator: In
                values: ["system"]
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchLabels:
                  aistor.min.io/name: object-store-operator
              topologyKey: topology.kubernetes.io/zone
            weight: 100
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                aistor.min.io/name: object-store-operator
            topologyKey: kubernetes.io/hostname
    resources:
      requests:
        cpu: 2m
        memory: 70Mi
      limits:
        memory: 70Mi
