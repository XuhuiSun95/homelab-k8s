minkms:
  hsm:
    key: "hsm:aes256:JbsGzClz/rmD/GeFGDGe8s4uWnuoUXV0zeVlcBgPrQs="
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: karpenter.sh/nodepool
              operator: In
              values: ["system"]
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              minkms.min.io/MinKMS: minkms
          topologyKey: kubernetes.io/hostname
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchLabels:
                minkms.min.io/MinKMS: minkms
            topologyKey: topology.kubernetes.io/zone
          weight: 100
  # TODO: remove once affinity is working
  nodeSelector:
    karpenter.sh/nodepool: system
  priorityClassName: platform-critical
  replicas: 3
  resources:
    requests:
      cpu: 60m
      memory: 32Mi
    limits:
      memory: 32Mi
  sideCars:
    resources:
      requests:
        cpu: 1m
        memory: 32Mi
      limits:
        memory: 32Mi
  tolerations:
    - key: node-role.kubernetes.io/system
      operator: Exists
      effect: NoSchedule