receivers:
    - name: default-receiver
    - name: null-receiver
route:
    active_time_intervals: []
    continue: false
    group_by:
        - grafana_folder
        - alertname
    group_interval: 5m
    group_wait: 30s
    matchers: []
    mute_time_intervals: []
    receiver: default-receiver
    repeat_interval: 4h
    routes:
        - active_time_intervals: []
          continue: false
          matchers:
            - severity="none"
          mute_time_intervals: []
          receiver: null-receiver
          routes: []
templates: []
