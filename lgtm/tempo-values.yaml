global:
  priorityClassName: platform-critical

ingester:
  replicas: 3
  zoneAwareReplication:
     enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 2Gi
    limits:
      memory: 2Gi
  affinity: |
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              {{- include "tempo.selectorLabels" (dict "ctx" . "component" "ingester") | nindent 12 }}
          topologyKey: kubernetes.io/hostname
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                {{- include "tempo.selectorLabels" (dict "ctx" . "component" "ingester") | nindent 12 }}
            topologyKey: topology.kubernetes.io/zone
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key:  karpenter.sh/nodepool
              operator: In
              values: ["memory-optimized"]
  tolerations:
    - key: node-role.kubernetes.io/memory-optimized 
      operator: Exists
      effect: NoSchedule
metricsGenerator:
  enabled: true
  config:
    storage:
      remote_write:
      - url: http://lgtm-mimir-gateway/api/v1/push
        send_exemplars: true
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 64Mi
  affinity: |
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              {{- include "tempo.selectorLabels" (dict "ctx" . "component" "metrics-generator") | nindent 10 }}
