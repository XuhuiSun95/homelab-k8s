traces:
  otlp:
    http:
      enabled: true
    grpc:
      enabled: true

storage:
  trace:
    backend: s3
    s3:
      bucket: tempo
      prefix: traces
      endpoint: minio.primary-object-store.svc.cluster.local
      tls_insecure_skip_verify: true
      forcepathstyle: true
      access_key: X3EEh4lU0Uz9M44FWebq
      secret_key: VcqVSaBjrsZhHm8qThNBuzjirzkI3EPB4tQwD5ad

