# OpenClawInstance CR = cluster admin agent (in-cluster administrator operations).
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: cluster-admin-agent
  namespace: openclaw
spec:
  envFrom:
    - secretRef:
        name: openclaw-env-vars
  config:
    mergeMode: merge
    raw:
      agents:
        defaults:
          model:
            primary: "openai-codex/gpt-5.3-codex"
      channels:
        discord:
          enabled: true
  # selfConfigure:
  #   enabled: true
  #   allowedActions: [skills, config, envVars, workspaceFiles]
  # resources:
  #   requests:
  #     cpu: 200m
  #     memory: 2Gi
  #   limits:
  #     memory: 2Gi
  storage:
    persistence:
      enabled: true
      size: 10Gi
      storageClass: nfs-csi