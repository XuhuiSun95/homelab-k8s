# OpenClawInstance CR = cluster admin agent (in-cluster administrator operations).
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: cluster-admin-agent
  namespace: openclaw
spec:
  envFrom:
    - secretRef:
        name: openclaw-env-vars
  gateway:
    allowedOrigins: ["https://openclaw-cluster-admin-agent.local.xuhuisun.com"]
  config:
    mergeMode: overwrite
    raw:
      agents:
        defaults:
          model:
            primary: "openai-codex/gpt-5.3-codex"
          sandbox:
            mode: all
            workspaceAccess: rw
      channels:
        discord:
          enabled: true
  # selfConfigure:
  #   enabled: true
  #   allowedActions: [skills, config, envVars, workspaceFiles]
  resources:
    requests:
      cpu: 1000m
      memory: 4Gi
    limits:
      memory: 4Gi
  storage:
    persistence:
      # accessModes:
      #   - ReadWriteMany
      enabled: true
      size: 10Gi
      storageClass: nfs-csi