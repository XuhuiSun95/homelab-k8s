# Istio VirtualService: OpenClaw Control UI (gateway port 18789)
# cluster-admin-agent service is created by the OpenClaw operator
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: openclaw-vs
  namespace: openclaw
spec:
  hosts:
    - openclaw.local.xuhuisun.com
  gateways:
    - istio-ingress/gateway
  http:
    - route:
        - destination:
            host: cluster-admin-agent
            port:
              number: 18789
