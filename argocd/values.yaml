global:
  domain: argocd.local.xuhuisun.com
  dualStack:
    ipFamilyPolicy: PreferDualStack
    ipFamilies: ["IPv6","IPv4"]
  priorityClassName: platform-critical
  tolerations:
  - key: node-role.kubernetes.io/system
    operator: Exists
    effect: NoSchedule
  affinity:
    podAntiAffinity: hard
    nodeAffinity:
      matchExpressions:
        - key: karpenter.sh/nodepool
          operator: In
          values: ["system"]

configs:
  params:
    server.insecure: true
  cm:
    oidc.config: |
      name: Keycloak
      issuer: https://iam.local.xuhuisun.com/realms/local
      clientID: argocd
      enablePKCEAuthentication: true
      requestedScopes: ["openid", "profile", "email", "groups"]
  rbac:
    policy.csv: |
      g, ArgoCDAdmins, role:admin

applicationSet:
  replicas: 2
  pdb:
    enabled: true
    minAvailable: 1
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
    limits:
      memory: 100Mi

dex:
  enabled: false

notifications:
  enabled: false

redis-ha:
  enabled: true
  haproxy:
    resources:
      requests:
        cpu: 5m
        memory: 120Mi
      limits:
        memory: 120Mi
    additionalAffinities:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
              - key: karpenter.sh/nodepool
                operator: In
                values: ["system"]
    tolerations:
    - key: node-role.kubernetes.io/system
      operator: Exists
      effect: NoSchedule
  redis:
    resources:
      requests:
        cpu: 30m
        memory: 30Mi
      limits:
        memory: 30Mi
  sentinel:
    resources:
      requests:
        cpu: 30m
        memory: 15Mi
      limits:
        memory: 15Mi
  splitBrainDetection:
    resources:
      requests:
        cpu: 1m
        memory: 5Mi
      limits:
        memory: 5Mi
  additionalAffinities:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: karpenter.sh/nodepool
              operator: In
              values: ["system"]
  tolerations:
  - key: node-role.kubernetes.io/system
    operator: Exists
    effect: NoSchedule

controller:
  replicas: 1
  vpa:
    enabled: true
    updateMode: InPlaceOrRecreate
    containerPolicy:
      controlledResources: ["cpu", "memory"]
      minAllowed:
        cpu: 100m
        memory: 1Gi 
      maxAllowed:
        cpu: 1
        memory: 2Gi
  resources:
    requests:
      cpu: 150m
      memory: 1Gi
    limits:
      memory: 1Gi

server:
  replicas: 2
  pdb:
    enabled: true
    minAvailable: 1
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
    limits:
      memory: 100Mi

repoServer:
  replicas: 2
  pdb:
    enabled: true
    minAvailable: 1
  resources:
    requests:
      cpu: 30m
      memory: 750Mi
    limits:
      memory: 750Mi