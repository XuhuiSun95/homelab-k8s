type: postgresql
version:
  postgresql: "18"
# mode: recovery

# recovery:
#   method: object_store
#   clusterName: n8n-cnpg-cluster
#   database: n8n
#   endpointURL: https://s3.local.xuhuisun.com
#   provider: s3
#   s3:
#     bucket: cloudnative-pg-backups
#     accessKey: om9WSI45aMEZxBqASwSy
#     secretKey: f31Tff9m6TaPJRhZ45GjO0HUxzx4yM8HmQ7xCnAJ

cluster:
  instances: 3
  storage:
    size: 4Gi
    storageClass: proxmox-local-zfs-xfs
  resources:
    requests:
      cpu: 300m
      memory: 512Mi
    limits:
      cpu: 300m
      memory: 512Mi
  affinity:
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required
  monitoring:
    enabled: true
    podMonitor:
      enabled: true
    prometheusRule:
      enabled: false
  postgresql:
    parameters:
      shared_buffers: 128MB
  initdb:
    database: n8n

backups:
  enabled: true
  endpointURL: https://minio.primary-object-store.svc.cluster.local
  endpointCA:
    create: false
    name: minio-ca-bundle
    key: ca-bundle.crt
  provider: s3
  s3:
    bucket: cloudnative-pg-backups
    accessKey: om9WSI45aMEZxBqASwSy
    secretKey: f31Tff9m6TaPJRhZ45GjO0HUxzx4yM8HmQ7xCnAJ
  scheduledBackups:
    - name: daily-backup
      schedule: "0 15 7 * * *"
      backupOwnerReference: self
  retentionPolicy: "7d"