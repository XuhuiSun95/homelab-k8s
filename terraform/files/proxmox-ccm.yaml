enabledControllers:
  - cloud-node-lifecycle

existingConfigSecret: proxmox-cloud-controller-manager

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 32Mi

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists