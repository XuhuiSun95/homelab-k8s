# Karpenter NodePools and Proxmox NodeClasses for homelab.
# Cluster capacity: 88 vCPU, 503Gi usable. Pool limits below (76 CPU, 400Gi total) leave headroom for control plane and static workloads.
# Instance types: c1/t1/s1/m1/x1 per https://github.com/sergelogvinov/karpenter-provider-proxmox/blob/main/docs/instancetypes.md
# expireAfter is max node lifetime; drift/consolidation can still replace nodes earlier.
---
apiVersion: karpenter.proxmox.sinextra.dev/v1alpha1
kind: ProxmoxUnmanagedTemplate
metadata:
  name: talos-worker-template
spec:
  templateName: talos-worker-template
---
# System workloads (e.g. core add-ons). Nodes are tainted/labeled via Talos CCM; workloads use matching nodeSelector/tolerations.
apiVersion: karpenter.proxmox.sinextra.dev/v1alpha1
kind: ProxmoxNodeClass
metadata:
  name: system-node-class
spec:
  instanceTemplateRef:
    kind: ProxmoxUnmanagedTemplate
    name: talos-worker-template
  metadataOptions:
    type: cdrom
    templatesRef:
      name: karpenter-template
      namespace: kube-system
  bootDevice:
    size: 50Gi
    storage: local-zfs
  tags:
    - managed-by_karpenter
    - type_k8s
    - type-k8s-role_system
    - cloned-from_talos-worker-template
---
# Memory-optimized workloads (high memory:CPU ratio).
apiVersion: karpenter.proxmox.sinextra.dev/v1alpha1
kind: ProxmoxNodeClass
metadata:
  name: memory-optimized-node-class
spec:
  instanceTemplateRef:
    kind: ProxmoxUnmanagedTemplate
    name: talos-worker-template
  metadataOptions:
    type: cdrom
    templatesRef:
      name: karpenter-template
      namespace: kube-system
  bootDevice:
    size: 50Gi
    storage: local-zfs
  tags:
    - managed-by_karpenter
    - type_k8s
    - type-k8s-role_memory-optimized
    - cloned-from_talos-worker-template
---
# User workloads (general compute). Instance families c1/s1 per provider instancetypes doc (see header).
apiVersion: karpenter.proxmox.sinextra.dev/v1alpha1
kind: ProxmoxNodeClass
metadata:
  name: user-node-class
spec:
  instanceTemplateRef:
    kind: ProxmoxUnmanagedTemplate
    name: talos-worker-template
  metadataOptions:
    type: cdrom
    templatesRef:
      name: karpenter-template
      namespace: kube-system
  bootDevice:
    size: 50Gi
    storage: local-zfs
  tags:
    - managed-by_karpenter
    - type_k8s
    - type-k8s-role_user
    - cloned-from_talos-worker-template
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: system
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.proxmox.sinextra.dev
        kind: ProxmoxNodeClass
        name: system-node-class
      expireAfter: 2160h
      terminationGracePeriod: 1h
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: karpenter.proxmox.sinextra.dev/instance-family
          operator: In
          values: ["c1", "s1"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - "c1.8VCPU-16GB"
            - "s1.4VCPU-16GB"
            - "s1.8VCPU-32GB"
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 60m
    # 20% for Empty/Drifted; max 1 node disrupting at once. Underutilized consolidation allowed 24/7; rate-limited by these budgets and workload PDBs.
    budgets:
    - nodes: "20%"
      reasons:
      - "Empty"
      - "Drifted"
    - nodes: "1"
  limits:
    cpu: "24"
    memory: 96Gi
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: memory-optimized
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.proxmox.sinextra.dev
        kind: ProxmoxNodeClass
        name: memory-optimized-node-class
      expireAfter: 720h
      terminationGracePeriod: 1h
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: karpenter.proxmox.sinextra.dev/instance-family
          operator: In
          values: ["m1"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - "m1.4VCPU-32GB"
            - "m1.8VCPU-64GB"
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 10m
    budgets:
    - nodes: "20%"
      reasons:
      - "Empty"
      - "Drifted"
    - nodes: "1"
  limits:
    cpu: "24"
    memory: 192Gi
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: user
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.proxmox.sinextra.dev
        kind: ProxmoxNodeClass
        name: user-node-class
      expireAfter: 720h
      terminationGracePeriod: 1h
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: karpenter.proxmox.sinextra.dev/instance-family
          operator: In
          values: ["c1", "s1"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - "c1.4VCPU-8GB"
            - "c1.8VCPU-16GB"
            - "c1.16VCPU-32GB"
            - "s1.4VCPU-16GB"
            - "s1.8VCPU-32GB"
            - "s1.16VCPU-64GB"
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 10m
    budgets:
    - nodes: "20%"
      reasons:
      - "Empty"
      - "Drifted"
    - nodes: "1"
  limits:
    cpu: "28"
    memory: 112Gi