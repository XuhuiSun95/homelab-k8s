service:
  ports:
  - name: status-port
    port: 15021
    protocol: TCP
    targetPort: 15021
  - name: http2
    port: 80
    protocol: TCP
    targetPort: 80
  - name: https
    port: 443
    protocol: TCP
    targetPort: 443
  - name: http3
    port: 443
    protocol: UDP
    targetPort: 443
  - name: tcp-kafka
    port: 9092
    protocol: TCP
    targetPort: 9092
  ipFamilyPolicy: RequireDualStack
  ipFamilies: ["IPv6", "IPv4"]

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 512Mi

autoscaling:
  minReplicas: 2
  maxReplicas: 6

# TODO: move to ingress nodepool
tolerations:
  - key: node-role.kubernetes.io/system
    operator: Exists
    effect: NoSchedule

topologySpreadConstraints:
- maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: ScheduleAnyway
  labelSelector:
    matchLabels:
      app.kubernetes.io/name: istio-ingress-gateway

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
          - key: karpenter.sh/nodepool
            operator: In
            values: ["system"]

podDisruptionBudget:
  minAvailable: 1

priorityClassName: platform-critical