type: postgresql
version:
  postgresql: "17"
mode: recovery

recovery:
  method: object_store
  clusterName: keycloak-cnpg-cluster-v3
  database: keycloak
  endpointURL: https://minio.primary-object-store.svc.cluster.local
  endpointCA:
    create: false
    name: minio-ca-bundle
    key: ca-bundle.crt
  provider: s3
  s3:
    bucket: cloudnative-pg-backups
    accessKey: om9WSI45aMEZxBqASwSy
    secretKey: f31Tff9m6TaPJRhZ45GjO0HUxzx4yM8HmQ7xCnAJ

cluster:
  instances: 3
  storage:
    size: 4Gi
    storageClass: proxmox-local-zfs-xfs
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      cpu: 100m
      memory: 1Gi
  priorityClassName: platform-critical
  affinity:
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required
    nodeSelector:
      karpenter.sh/nodepool: system
    tolerations:
    - key: node-role.kubernetes.io/system
      operator: Exists
      effect: NoSchedule
  monitoring:
    enabled: true
    podMonitor:
      enabled: true
    prometheusRule:
      enabled: false
  postgresql:
    parameters:
      shared_buffers: 256MB
  initdb:
    database: keycloak

backups:
  enabled: true
  endpointURL: https://minio.primary-object-store.svc.cluster.local
  endpointCA:
    create: false
    name: minio-ca-bundle
    key: ca-bundle.crt
  provider: s3
  s3:
    bucket: cloudnative-pg-backups
    accessKey: om9WSI45aMEZxBqASwSy
    secretKey: f31Tff9m6TaPJRhZ45GjO0HUxzx4yM8HmQ7xCnAJ
  scheduledBackups:
    - name: daily-backup
      schedule: "0 7 0 * * *"
      backupOwnerReference: self
  retentionPolicy: "7d"